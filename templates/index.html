<!DOCTYPE html>
<html>

    <head>
        <title>Weather app!!!</title>

        <style>

            body {
                text-align: center;
                margin-top: 50px;
                font-size: 25px;
            }

            h1 {
                color: red;
            }

            table {
            width: 70%;
            border-collapse: collapse;
            text-align: center;
            border-radius: 10px;
            }

            th {
            background-color: #f2f2f2;
            color: #333;
            padding: 8px;
            border: 1px solid #ddd;
            }

            tr:nth-child(even) {
            background-color: #f9f9f9;
            }

            td {
            padding: 8px;
            border: 1px solid #ddd;
            }

        </style>

    </head>

    <body>
        <h1>Weather stats</h1>

        <form method="POST">

            <label>Enter the location coordinates</label>
            <input placeholder="latitude" name = "latitude">
            <input placeholder="longtitude" name = "longtitude">
            <input type="submit">

        </form>

        {% if weather %}
        <center>
            <table>
                <tr><td colspan = "2" ><img src="{{weather.data.condition.icon}}"></td></tr>
                <tr><td>Place</td><td>{{weather.data.name}}</td></tr>
                <tr><td>Region</td><td>{{weather.data.region}}</td></tr>
                <tr><td>Country</td><td>{{weather.data.country}}</td></tr>
                <tr><td>Condition</td><td>{{weather.data.condition.text}}</td></tr>
                <tr><td>Tempreture</td><td>{{weather.data.temp_c}}</td></tr>
            </table>
        </center>
        {% endif %}

        <p>Your have {{ count }} visitors!!!</p>

    </body>

</html>
